<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>501 Feature Cards Module</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <main>
      <section class="feature-cards-section">
        <div class="container">
          <div class="feature-cards">
            <article class="feature-card">
              <div class="feature-card__image-wrapper">
                <img src="/assets/501-image-1.jpg" alt="Clapping hands icon" />
              </div>
              <div class="feature-card__content">
                <p class="feature-card__label">More than</p>
                <h3 class="feature-card__value">6,000,000</h3>
                <p class="feature-card__text">Delighted guests</p>
              </div>
            </article>
            <article class="feature-card">
              <div class="feature-card__image-wrapper">
                <img src="/assets/501-image-2.jpg" alt="Globe icon" />
              </div>
              <div class="feature-card__content">
                <p class="feature-card__label">Find us in</p>
                <h3 class="feature-card__value">45</h3>
                <p class="feature-card__text">countries</p>
              </div>
            </article>
            <article class="feature-card">
              <div class="feature-card__image-wrapper">
                <img src="/assets/501-image-3.jpg" alt="Dart icon" />
              </div>
              <div class="feature-card__content">
                <p class="feature-card__label">Over</p>
                <h3 class="feature-card__value">501,000,000</h3>
                <p class="feature-card__text">darts thrown</p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
    <script src="./scripts/main.js"></script>
  </body>
</html>
